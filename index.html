<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PSHS-MC Demonlist</title>
<style>
  :root{
    --bg:#0b0d12;
    --panel:#111522;
    --line:#1e2438;
    --text:#e9eefc;
    --muted:#9aa3b2;
    --accent:#ff4b4b;
  }

  body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:var(--bg);
    color:var(--text);
  }

  header{
    background:var(--panel);
    border-bottom:1px solid var(--line);
    padding:16px 18px;
    font-size:20px;
    font-weight:700;
    position:sticky;
    top:0;
  }

  .wrap{
    max-width:1000px;
    margin:20px auto;
    padding:0 16px;
  }

  .list{
    border:1px solid var(--line);
    border-radius:10px;
    overflow:hidden;
  }

  .row{
    display:flex;
    gap:14px;
    padding:14px;
    border-bottom:1px solid var(--line);
    background:#0f1320;
    cursor:pointer;
    transition:.15s;
  }

  .row:hover{
    background:#171c2d;
  }

  .rank{
    width:60px;
    color:var(--accent);
    font-weight:700;
    font-size:18px;
  }

  .thumb{
    width:160px;
    height:90px;
    background:#222;
    border-radius:6px;
    overflow:hidden;
    flex-shrink:0;
  }

  .thumb img{
    width:100%;
    height:100%;
    object-fit:cover;
  }

  .info{
    flex:1;
  }

  .title{
    font-size:18px;
    font-weight:700;
  }

  .sub{
    font-size:13px;
    color:var(--muted);
    margin-top:4px;
  }

  .points{
    font-size:13px;
    color:#cfd6e6;
    margin-top:6px;
  }

  /* DETAIL PAGE */
  .detail{
    display:none;
  }

  .back{
    color:var(--muted);
    cursor:pointer;
    margin-bottom:12px;
    display:inline-block;
  }

  .video{
    width:100%;
    aspect-ratio:16/9;
    margin-top:12px;
  }

  iframe{
    width:100%;
    height:100%;
    border:none;
  }

  .stats{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
    margin-top:14px;
    font-size:13px;
    color:var(--muted);
  }

  .stat{
    background:#0f1320;
    border:1px solid var(--line);
    padding:10px;
    border-radius:8px;
  }
</style>
</head>
<body>

<header>PSHS-MC Demonlist</header>

<div class="wrap">

<!-- LIST PAGE -->
<div id="listPage">
  <div class="list" id="list"></div>
</div>

<!-- DETAIL PAGE -->
<div class="detail" id="detailPage">
  <div class="back" onclick="back()">← Back to list</div>
  <h2 id="dTitle"></h2>
  <div id="dInfo" class="sub"></div>

  <div class="video" id="video"></div>

  <div class="stats" id="stats"></div>
</div>

</div>

<script>
const demons = [
  {
    rank:1,
    name:"Bloodbath",
    creator:"Riot",
    id:"10565740",
    diff:"Extreme Demon",
    points:"23.99",
    img:"https://i.ytimg.com/vi/placeholder/mqdefault.jpg"
  },
  {
    rank:2,
    name:"Cataclysm",
    creator:"GGboy",
    id:"3979721",
    diff:"Extreme Demon",
    points:"20.92",
    img:"https://i.ytimg.com/vi/placeholder/mqdefault.jpg"
  },
  {
    rank:3,
    name:"Poltergeist",
    creator:"AndromedaGMD",
    id:"7054561",
    diff:"Insane Demon",
    points:"15.94",
    img:"https://i.ytimg.com/vi/placeholder/mqdefault.jpg"
  },
  {
    rank:4,
    name:"Nine Circles",
    creator:"Zobros",
    id:"533927",
    diff:"Hard Demon",
    points:"11.16",
    img:"https://i.ytimg.com/vi/placeholder/mqdefault.jpg"
  },
  {
    rank:5,
    name:"Jawbreaker",
    creator:"ZenthicAlpha",
    id:"6939821",
    diff:"Hard Demon",
    points:"11.14",
    img:"https://i.ytimg.com/vi/placeholder/mqdefault.jpg"
  },
  {
    rank:6,
    name:"Thermal Madness",
    creator:"ManiacDan",
    id:"111205474",
    diff:"Hard Demon",
    points:"8.01",
    img:"https://i.ytimg.com/vi/placeholder/mqdefault.jpg"
  },
  {
    rank:7,
    name:"Solar Circles",
    creator:"D4rkGryf",
    id:"493898",
    diff:"Medium Demon",
    points:"5.91",
    img:"https://i.ytimg.com/vi/placeholder/mqdefault.jpg"
  }
];

const listEl = document.getElementById("list");
const listPage = document.getElementById("listPage");
const detailPage = document.getElementById("detailPage");

function renderList(){
  listEl.innerHTML = demons.map(d => `
    <div class="row" onclick="openLevel(${d.rank})">
      <div class="rank">#${d.rank}</div>
      <div class="thumb"><img src="${d.img}" /></div>
      <div class="info">
        <div class="title">${d.name}</div>
        <div class="sub">published by ${d.creator}</div>
        <div class="points">${d.points} points • ${d.diff}</div>
      </div>
    </div>
  `).join("");
}

function openLevel(rank){
  const d = demons.find(x => x.rank === rank);

  listPage.style.display="none";
  detailPage.style.display="block";

  document.getElementById("dTitle").textContent = `#${d.rank} – ${d.name}`;
  document.getElementById("dInfo").textContent = `published by ${d.creator} • ID ${d.id}`;

  document.getElementById("video").innerHTML = `
    <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ"></iframe>
  `;

  document.getElementById("stats").innerHTML = `
    <div class="stat">Difficulty: ${d.diff}</div>
    <div class="stat">Points: ${d.points}</div>
    <div class="stat">Level ID: ${d.id}</div>
  `;
}

function back(){
  detailPage.style.display="none";
  listPage.style.display="block";
}

renderList();
</script>

</body>
</html>
