<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PSHS-MC Demonlist</title>
<style>
  :root{
    --bg:#0b0d12;
    --panel:#111522;
    --line:#1e2438;
    --text:#e9eefc;
    --muted:#9aa3b2;
    --accent:#ff4b4b;
  }

  body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:var(--bg);
    color:var(--text);
  }

  header{
    background:var(--panel);
    border-bottom:1px solid var(--line);
    padding:16px 18px;
    font-size:20px;
    font-weight:700;
    position:sticky;
    top:0;
    z-index:10;
  }

  .wrap{
    max-width:1000px;
    margin:20px auto;
    padding:0 16px;
  }

  #search{
    width:100%;
    box-sizing:border-box;
    padding:12px 14px;
    margin-bottom:12px;
    border-radius:8px;
    border:1px solid var(--line);
    background:#0f1320;
    color:var(--text);
    outline:none;
    font-size:14px;
  }

  #search::placeholder{
    color:var(--muted);
  }

  .list{
    border:1px solid var(--line);
    border-radius:10px;
    overflow:hidden;
  }

  .row{
    display:flex;
    gap:14px;
    padding:14px;
    border-bottom:1px solid var(--line);
    background:#0f1320;
    cursor:pointer;
    transition:.15s;
  }

  .row:hover{
    background:#171c2d;
  }

  .rank{
    width:60px;
    color:var(--accent);
    font-weight:700;
    font-size:18px;
    flex-shrink:0;
  }

  .thumb{
    width:160px;
    height:90px;
    background:#222;
    border-radius:6px;
    overflow:hidden;
    flex-shrink:0;
  }

  .thumb img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }

  .info{
    flex:1;
    min-width:0;
  }

  .title{
    font-size:18px;
    font-weight:700;
  }

  .sub{
    font-size:13px;
    color:var(--muted);
    margin-top:4px;
  }

  .points{
    font-size:13px;
    color:#cfd6e6;
    margin-top:6px;
  }

  .detail{
    display:none;
  }

  .back{
    color:var(--muted);
    cursor:pointer;
    margin-bottom:12px;
    display:inline-block;
  }

  .video{
    width:100%;
    aspect-ratio:16/9;
    margin-top:12px;
    background:#0f1320;
    border:1px solid var(--line);
    border-radius:10px;
    overflow:hidden;
  }

  iframe{
    width:100%;
    height:100%;
    border:none;
  }

  .no-video{
    padding:18px;
    color:var(--muted);
    font-size:14px;
  }

  .stats{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
    margin-top:14px;
    font-size:13px;
    color:var(--muted);
  }

  .stat{
    background:#0f1320;
    border:1px solid var(--line);
    padding:10px;
    border-radius:8px;
  }

  .empty{
    padding:16px;
    color:var(--muted);
    border:1px solid var(--line);
    border-radius:10px;
    background:#0f1320;
  }

  @media (max-width:700px){
    .row{
      flex-direction:column;
    }

    .thumb{
      width:100%;
      height:auto;
      aspect-ratio:16/9;
    }

    .stats{
      grid-template-columns:1fr;
    }
  }
</style>
</head>
<body>

<header>PSHS-MC Demonlist</header>

<div class="wrap">
  <!-- LIST PAGE -->
  <div id="listPage">
    <input id="search" type="text" placeholder="Search demons, creators, verifiers, or difficulty..." />
    <div class="list" id="list"></div>
  </div>

  <!-- DETAIL PAGE -->
  <div class="detail" id="detailPage">
    <div class="back" onclick="back()">← Back to list</div>
    <h2 id="dTitle"></h2>
    <div id="dInfo" class="sub"></div>

    <div class="video" id="video"></div>

    <div class="stats" id="stats"></div>
  </div>
</div>

const listEl = document.getElementById("list");
const listPage = document.getElementById("listPage");
const detailPage = document.getElementById("detailPage");
const searchEl = document.getElementById("search");

function renderList(filter = ""){
  const q = filter.toLowerCase().trim();

  const filtered = demons.filter(d =>
    d.name.toLowerCase().includes(q) ||
    d.creator.toLowerCase().includes(q) ||
    d.diff.toLowerCase().includes(q) ||
    d.verifier.toLowerCase().includes(q)
  );

  if (filtered.length === 0) {
    listEl.innerHTML = `<div class="empty">No demons found.</div>`;
    return;
  }

  listEl.innerHTML = filtered.map(d => `
    <div class="row" onclick="openLevel(${d.rank})">
      <div class="rank">#${d.rank}</div>
      <div class="thumb"><img src="${d.img}" alt="${d.name}" /></div>
      <div class="info">
        <div class="title">${d.name}</div>
        <div class="sub">published by ${d.creator}</div>
        <div class="sub">verified by ${d.verifier}</div>
        <div class="points">${d.points} points • ${d.diff}</div>
      </div>
    </div>
  `).join("");
}

function openLevel(rank){
  const d = demons.find(x => x.rank === rank);
  if (!d) return;

  listPage.style.display = "none";
  detailPage.style.display = "block";

  document.getElementById("dTitle").textContent = `#${d.rank} – ${d.name}`;
  document.getElementById("dInfo").textContent = `published by ${d.creator} • verifier ${d.verifier} • ID ${d.id}`;

  if (d.video && d.video.trim() !== "") {
    document.getElementById("video").innerHTML = `
      <iframe src="${d.video}" allowfullscreen></iframe>
    `;
  } else {
    document.getElementById("video").innerHTML = `<div class="no-video">No video linked yet.</div>`;
  }

  document.getElementById("stats").innerHTML = `
    <div class="stat">Difficulty: ${d.diff}</div>
    <div class="stat">Points: ${d.points}</div>
    <div class="stat">Level ID: ${d.id}</div>
  `;
}

function back(){
  detailPage.style.display = "none";
  listPage.style.display = "block";
}

searchEl.addEventListener("input", e => {
  renderList(e.target.value);
});

renderList();
</script>
