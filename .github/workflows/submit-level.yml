name: Submit Level

on:
  repository_dispatch:
    types: [submit-level]

permissions:
  contents: write

jobs:
  add-level:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Add level to pending.json
        run: |
          node <<'EOF'
          const fs = require('fs');

          const item = JSON.parse(process.env.ITEM);
          const data = JSON.parse(fs.readFileSync('pending.json', 'utf8'));

          data.push(item);
          fs.writeFileSync('pending.json', JSON.stringify(data, null, 2));
          EOF
        env:
          ITEM: ${{ toJson(github.event.client_payload.level) }}

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pending.json
          git commit -m "New level submission" || echo "No changes to commit"
          git push
