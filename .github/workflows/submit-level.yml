name: Submit Level

on:
  repository_dispatch:
    types: [submit-level]

jobs:
  add-level:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Add level to pending.json
        run: |
          node -e "
          const fs = require('fs');

          const newLevel = process.env.LEVEL;

          const data = JSON.parse(fs.readFileSync('pending.json', 'utf8'));

          data.push(JSON.parse(newLevel));

          fs.writeFileSync('pending.json', JSON.stringify(data, null, 2));
          "
        env:
          LEVEL: ${{ github.event.client_payload.level }}

      - name: Commit changes
        run: |
          git config user.name 'pshs-bot'
          git config user.email 'bot@users.noreply.github.com'
          git add pending.json
          git commit -m 'New level submission'
          git push
